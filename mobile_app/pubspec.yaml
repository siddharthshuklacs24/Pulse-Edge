name: pulse_edge
description: Offline cardiac risk monitoring app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.4.3
  # UI additions from branch
  cupertino_icons: ^1.0.8

  # State Management (Main version to support backend logic)
  flutter_riverpod: ^3.3.1

  # Sensors (Main version)
  sensors_plus: ^7.0.0

  # Background Execution (Main version)
  flutter_local_notifications: ^17.1.2
  flutter_background_service: ^5.0.5
  flutter_background_service_android: ^6.2.2

  # Live Chart (Main version)
  fl_chart: ^1.2.0

  # TFLite On-Device Inference (Main version)
  tflite_flutter: ^0.12.1

  # Local Database
  sqflite: ^2.3.2
  path: ^1.9.0

  # Alerts & Permissions (Main versions)
  vibration: ^3.1.8
  audioplayers: ^6.6.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Main version
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/audio/
    - assets/images/ # Added from branch for frontend